<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piece By Peas - Add Meal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="sidebar">
  <div class="nav-user" id="navUser" onclick="toggleDropdown()">
    <svg width="28" height="28" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20v-1a8 8 0 0116 0v1"/></svg>
    <span class="nav-user-name" id="userGreeting">Hello</span>
    <div class="user-dropdown" id="userDropdown">
      <div class="dropdown-email" id="dropdownEmail">—</div>
      <button class="dropdown-item" onclick="openProfile()">Edit information</button>
      <button class="dropdown-item" onclick="toggleLanguage()">Language (English)</button>
      <button class="dropdown-item logout" onclick="logout()">Log Out</button>
    </div>
  </div>
  <div class="nav-items">
    <a href="index.html" class="nav-item" id="nav-home" aria-label="Home">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    </a>
    <a href="add.html" class="nav-item active" id="nav-add" aria-label="Add meal">
      <div class="nav-icon-circle">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
    </a>
    <a href="log.html" class="nav-item" id="nav-log" aria-label="Log">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M9 11H3v2h6v-2zm0-4H3v2h6V7zm0 8H3v2h6v-2zm12-8h-6v2h6V7zm0 4h-6v2h6v-2zm0 4h-6v2h6v-2z"/></svg>
    </a>
    <a href="report.html" class="nav-item" id="nav-report" aria-label="Report">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="7" y1="8" x2="17" y2="8"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="7" y1="16" x2="11" y2="16"/></svg>
    </a>
  </div>
</nav>

<div class="modal-overlay" id="profileModal">
  <div class="modal-card">
    <p class="modal-title">Edit information</p>
    <div class="modal-field"><label>Name</label><input type="text" id="profileName"></div>
    <div class="modal-field"><label>Email</label><input type="email" id="profileEmail"></div>
    <div class="modal-field"><label>New password</label><input type="password" id="profilePassword" placeholder="Leave blank to keep current"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeProfile()">Cancel</button>
      <button class="btn-primary" onclick="saveProfile()">Save</button>
    </div>
  </div>
</div>

<div class="main-content">
  <div class="page-wrap">
    <img src="Bea.png" alt="Bea" class="page-bea">
    <div class="page-logo">PIECE BY PEAS</div>

    <div class="add-wrap">
      <h2 class="page-title">ADD A MEAL</h2>
      <form id="mealForm">
        <div class="form-section">
          <label class="form-label" for="mealName">Title:</label>
          <input type="text" id="mealName" class="form-input" placeholder="What did you eat?" required>
        </div>

        <div class="form-section">
          <div class="form-row">
            <div>
              <label class="form-label" for="mealType">This is your:</label>
              <select id="mealType" class="form-select" required>
                <option value="">Select meal type</option>
                <option value="breakfast">Breakfast</option>
                <option value="lunch">Lunch</option>
                <option value="dinner">Dinner</option>
                <option value="brunch">Brunch</option>
                <option value="snack">Snack</option>
              </select>
            </div>
            <div>
              <label class="form-label" for="mealTime">It was on:</label>
              <input type="time" id="mealTime" class="form-input" required>
            </div>
          </div>
        </div>

        <div class="form-section">
          <label class="form-label">Add a tag:</label>
          <div class="tag-select" id="tagSelect">
            <button type="button" class="tag-option" data-tag="diet">Diet meal</button>
            <button type="button" class="tag-option" data-tag="cheat">Cheat meal</button>
            <button type="button" class="tag-option" data-tag="balanced">Balanced</button>
            <button type="button" class="tag-option" data-tag="light">Light</button>
          </div>
        </div>

        <div class="form-section">
          <label class="form-label">Included:</label>
          <div class="food-grid">
            <div class="food-item">
              <input type="checkbox" id="grains" value="grains">
              <label for="grains" class="food-label grains">
                <div class="food-icon">🌾</div>
                <span>Grains</span>
              </label>
            </div>
            <div class="food-item">
              <input type="checkbox" id="protein" value="protein">
              <label for="protein" class="food-label protein">
                <div class="food-icon">🥩</div>
                <span>Protein</span>
              </label>
            </div>
            <div class="food-item">
              <input type="checkbox" id="vegetables" value="vegetables">
              <label for="vegetables" class="food-label vegetables">
                <div class="food-icon">🥬</div>
                <span>Vegetables</span>
              </label>
            </div>
            <div class="food-item">
              <input type="checkbox" id="fruits" value="fruits">
              <label for="fruits" class="food-label fruits">
                <div class="food-icon">🍎</div>
                <span>Fruits</span>
              </label>
            </div>
            <div class="food-item">
              <input type="checkbox" id="dairy" value="dairy">
              <label for="dairy" class="food-label dairy">
                <div class="food-icon">🥛</div>
                <span>Dairy</span>
              </label>
            </div>
            <div class="food-item">
              <input type="checkbox" id="snacks" value="snacks">
              <label for="snacks" class="food-label snacks">
                <div class="food-icon">🍪</div>
                <span>Snacks</span>
              </label>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-secondary" onclick="location.href='index.html'">Cancel</button>
          <button type="submit" class="btn-primary">Submit</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
