<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piece By Peas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <img src="Bea.png" alt="Bea" class="login-bea">
    <div class="login-card">
      <div class="login-logo">PIECE BY PEAS</div>
      <form id="loginForm">
        <div class="input-group">
          <input type="email" id="loginEmail" placeholder="User name / Email" required>
        </div>
        <div class="input-group">
          <input type="password" id="loginPassword" placeholder="Password" required>
        </div>
        <button type="submit" class="login-btn">Log in</button>
      </form>
      <button class="signup-btn" onclick="location.href='register.html'">Sign up</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
