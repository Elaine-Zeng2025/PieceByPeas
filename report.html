<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piece By Peas - Report</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="sidebar">
  <div class="nav-user" id="navUser" onclick="toggleDropdown()">
    <svg width="28" height="28" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20v-1a8 8 0 0116 0v1"/></svg>
    <span class="nav-user-name" id="userGreeting">Hello</span>
    <div class="user-dropdown" id="userDropdown">
      <div class="dropdown-email" id="dropdownEmail">—</div>
      <button class="dropdown-item" onclick="openProfile()">Edit information</button>
      <button class="dropdown-item" onclick="toggleLanguage()">Language (English)</button>
      <button class="dropdown-item logout" onclick="logout()">Log Out</button>
    </div>
  </div>
  <div class="nav-items">
    <a href="index.html" class="nav-item" aria-label="Home">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    </a>
    <a href="add.html" class="nav-item" aria-label="Add meal">
      <div class="nav-icon-circle">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
    </a>
    <a href="log.html" class="nav-item" aria-label="Log">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M9 11H3v2h6v-2zm0-4H3v2h6V7zm0 8H3v2h6v-2zm12-8h-6v2h6V7zm0 4h-6v2h6v-2zm0 4h-6v2h6v-2z"/></svg>
    </a>
    <a href="report.html" class="nav-item active" aria-label="Report">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="7" y1="8" x2="17" y2="8"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="7" y1="16" x2="11" y2="16"/></svg>
    </a>
  </div>
</nav>

<div class="modal-overlay" id="profileModal">
  <div class="modal-card">
    <p class="modal-title">Edit information</p>
    <div class="modal-field"><label>Name</label><input type="text" id="profileName"></div>
    <div class="modal-field"><label>Email</label><input type="email" id="profileEmail"></div>
    <div class="modal-field"><label>New password</label><input type="password" id="profilePassword" placeholder="Leave blank to keep current"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeProfile()">Cancel</button>
      <button class="btn-primary" onclick="saveProfile()">Save</button>
    </div>
  </div>
</div>

<div class="main-content">
  <div class="page-wrap">
    <img src="Bea.png" alt="Bea" class="page-bea">
    <div class="page-logo">PIECE BY PEAS</div>

    <div class="report-wrap">
      <!-- Period selector -->
      <div class="period-tabs">
        <button class="period-tab" id="tabMonth" onclick="setPeriod('month')">This Month</button>
        <button class="period-tab active" id="tabWeek" onclick="setPeriod('week')">This Week</button>
        <button class="period-tab" id="tabCustom" onclick="setPeriod('custom')">Last 7 Days</button>
      </div>
      <div class="period-range" id="periodRange"></div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Days covered this week</div>
          <div class="stat-value" id="statDays">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Average meals per day</div>
          <div class="stat-value" id="statAvg">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Most commonly consumed</div>
          <div class="stat-value" id="statTop">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Most commonly missing</div>
          <div class="stat-value warning" id="statMissing">—</div>
        </div>
      </div>

      <!-- Legend -->
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#f0945d"></div>Grains</div>
        <div class="legend-item"><div class="legend-dot" style="background:#EF82A0"></div>Protein</div>
        <div class="legend-item"><div class="legend-dot" style="background:#6bb392"></div>Vegetables</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ffd970"></div>Fruits</div>
        <div class="legend-item"><div class="legend-dot" style="background:#88abda"></div>Dairy</div>
        <div class="legend-item"><div class="legend-dot" style="background:#dcc7e1"></div>Snacks</div>
      </div>

      <!-- Charts -->
      <div class="chart-block">
        <div class="chart-title" id="barTitle">Daily food group coverage</div>
        <div style="position:relative;width:100%;height:200px">
          <canvas id="barChart"></canvas>
        </div>
      </div>

      <div class="chart-block">
        <div class="chart-title">Nutrition coverage radar</div>
        <div style="position:relative;width:100%;height:220px">
          <canvas id="radarChart"></canvas>
        </div>
      </div>

      <div class="chart-block">
        <div class="chart-title">Meal type distribution</div>
        <div style="position:relative;width:100%;height:180px">
          <canvas id="donutChart"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="script.js"></script>
</body>
</html>
